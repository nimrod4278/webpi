<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wepi — pi agent in the browser</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
      #log { white-space: pre-wrap; background: #f5f5f5; border-radius: 8px; padding: 1rem; min-height: 10rem; }
      input, button { font: inherit; padding: 0.5rem; }
      #msg { width: 68%; }
      .meta { color: #888; font-size: 12px; }
      .files { font-family: ui-monospace, monospace; font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <h1>wepi</h1>
    <p class="meta">The pi coding agent, running natively in your browser. Files live in a sandboxed virtual workspace.</p>
    <p><input id="key" type="password" placeholder="Anthropic API key (sk-ant-…)" size="48" /></p>
    <p>
      <input id="msg" placeholder="Ask pi to create or edit a file…" disabled />
      <button id="send" disabled>Send</button>
    </p>
    <div id="log"></div>
    <p class="meta">Workspace: <span id="files" class="files">(empty)</span></p>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
