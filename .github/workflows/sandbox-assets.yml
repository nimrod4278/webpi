# Build the container2wasm sandbox rootfs and publish the "basic image" +
# runtime blobs as a release asset that `wepi-fetch-assets` pulls on demand.
#
# The bundle contains everything C2wSandbox expects under assetsBaseUrl:
#   alpine/  out.wasm.gzip  imagemounter.wasm.gzip  worker.js  dist/*.js
# Only alpine/ is built here (from packages/sdk/scripts/sandbox.Dockerfile);
# the rest are vendored container2wasm upstream blobs committed under
# apps/client/public and copied in as-is.
name: sandbox-assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the bundle to
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # riscv64 emulation for the Alpine build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build the riscv64 eStargz rootfs
        run: node packages/sdk/scripts/build-image.mjs "$RUNNER_TEMP/assets/alpine"

      - name: Assemble the asset bundle
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/assets"
          src=apps/client/public
          cp "$src/out.wasm.gzip" "$src/imagemounter.wasm.gzip" "$src/worker.js" "$out/"
          mkdir -p "$out/dist"
          cp "$src/dist/"*.js "$out/dist/"
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          version="${tag#v}"
          tar -czf "wepi-sandbox-assets-${version}.tar.gz" -C "$out" .
          sha256sum "wepi-sandbox-assets-${version}.tar.gz"

      - name: Attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$tag" wepi-sandbox-assets-*.tar.gz --clobber
